<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 할 일</title>
<style>
  :root {
    color-scheme: light dark;

    --bg: #F3F4F6;
    --text: #111827;
    --text-secondary: #6B7280;
    --text-muted: #9CA3AF;
    --surface: #FFFFFF;
    --surface-alt: #F9FAFB;
    --border: #E5E7EB;
    --border-strong: #D1D5DB;
    --shadow: rgba(0, 0, 0, 0.06);

    --accent: #6366F1;
    --accent-hover: #4F46E5;
    --personal: #3B82F6;
    --study: #8B5CF6;
    --hobby: #10B981;
    --danger: #EF4444;

    --chip-all-bg: #EEF2FF;
    --chip-personal-bg: #EFF6FF;
    --chip-study-bg: #F5F3FF;
    --chip-hobby-bg: #ECFDF5;
  }

  :root[data-theme="dark"] {
    --bg: #0F172A;
    --text: #E5E7EB;
    --text-secondary: #9CA3AF;
    --text-muted: #6B7280;
    --surface: #1E293B;
    --surface-alt: #172033;
    --border: #334155;
    --border-strong: #475569;
    --shadow: rgba(0, 0, 0, 0.4);

    --chip-all-bg: rgba(99, 102, 241, 0.18);
    --chip-personal-bg: rgba(59, 130, 246, 0.18);
    --chip-study-bg: rgba(139, 92, 246, 0.18);
    --chip-hobby-bg: rgba(16, 185, 129, 0.18);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    transition: background 0.2s ease, color 0.2s ease;
  }

  /* .container 역할 (실제 DOM 클래스명은 .app) */
  .app {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  header {
    padding: 0 0 20px;
  }

  .header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  #theme-toggle,
  #logout-btn {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  #theme-toggle:hover {
    border-color: var(--accent);
  }

  #logout-btn:hover {
    border-color: var(--danger);
  }

  #auth-section {
    padding: 4px 0 8px;
  }

  .auth-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .auth-tab-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface-alt);
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }

  .auth-tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .auth-form input {
    padding: 12px;
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s ease;
  }

  .auth-form input:focus {
    border-color: var(--accent);
  }

  .auth-submit-btn {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .auth-submit-btn:hover {
    background: var(--accent-hover);
  }

  .auth-message {
    min-height: 16px;
    margin: 0;
    font-size: 13px;
    color: var(--danger);
  }

  #progress-section {
    padding: 0 0 20px;
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .progress-bar {
    width: 100%;
    height: 10px;
    background: var(--border);
    border-radius: 9999px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 9999px;
    background: var(--accent);
    transition: width 0.3s ease;
  }

  .progress-bar-fill[data-category="전체"] {
    background: var(--accent);
  }

  .progress-bar-fill[data-category="개인"] {
    background: var(--personal);
  }

  .progress-bar-fill[data-category="공부"] {
    background: var(--study);
  }

  .progress-bar-fill[data-category="취미"] {
    background: var(--hobby);
  }

  #category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 0 20px;
    overflow-x: auto;
  }

  .tab-btn {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }

  .tab-btn.active[data-category="전체"] {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .tab-btn.active[data-category="개인"] {
    background: var(--personal);
    border-color: var(--personal);
    color: #fff;
  }

  .tab-btn.active[data-category="공부"] {
    background: var(--study);
    border-color: var(--study);
    color: #fff;
  }

  .tab-btn.active[data-category="취미"] {
    background: var(--hobby);
    border-color: var(--hobby);
    color: #fff;
  }

  #todo-list {
    padding: 0 0 12px;
    min-height: 120px;
  }

  #todo-list ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border-radius: 12px;
    padding: 14px 16px;
    border-left: 3px solid var(--accent);
    transition: box-shadow 0.15s ease, background 0.15s ease;
  }

  .todo-item[data-category="개인"] {
    border-left-color: var(--personal);
  }

  .todo-item[data-category="공부"] {
    border-left-color: var(--study);
  }

  .todo-item[data-category="취미"] {
    border-left-color: var(--hobby);
  }

  .todo-item:hover {
    box-shadow: 0 2px 8px var(--shadow);
  }

  .todo-item.completed {
    background: var(--surface-alt);
    border-left-color: transparent;
  }

  .todo-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .todo-item .todo-text {
    flex: 1;
    word-break: break-all;
    font-size: 14px;
    color: var(--text);
  }

  .todo-item.completed .todo-text {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  /* 인라인 수정용 입력창 (수정 모드 진입 시) */
  .todo-item input[type="text"] {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    color: var(--text);
    padding: 0 0 2px;
    outline: none;
    border-bottom: 1px solid transparent;
  }

  .todo-item input[type="text"]:focus {
    border-bottom-color: var(--accent);
  }

  .todo-item .todo-category {
    font-size: 11px;
    color: var(--accent);
    background: var(--chip-all-bg);
    padding: 2px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .todo-item[data-category="개인"] .todo-category {
    color: var(--personal);
    background: var(--chip-personal-bg);
  }

  .todo-item[data-category="공부"] .todo-category {
    color: var(--study);
    background: var(--chip-study-bg);
  }

  .todo-item[data-category="취미"] .todo-category {
    color: var(--hobby);
    background: var(--chip-hobby-bg);
  }

  .todo-item button {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1;
  }

  .todo-item button:hover {
    color: var(--danger);
  }

  .empty-message {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 32px 0;
  }

  #input-area {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 20px 0 0;
    margin-top: 8px;
    border-top: 1px solid var(--border);
  }

  #todo-input {
    flex: 1 1 160px;
    min-width: 0;
    padding: 12px;
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s ease;
  }

  #todo-input:focus {
    border-color: var(--accent);
  }

  #category-select {
    padding: 12px;
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
  }

  #add-btn {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  #add-btn:hover {
    background: var(--accent-hover);
  }

  @media (max-width: 360px) {
    .app {
      padding: 16px 10px;
    }

    #todo-input,
    #category-select,
    #add-btn {
      font-size: 13px;
    }

    .tab-btn {
      padding: 8px 12px;
      font-size: 13px;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-bar">
        <h1>📋 오늘의 할 일</h1>
        <div class="header-actions">
          <button id="logout-btn" type="button" aria-label="로그아웃" style="display: none;">🚪</button>
          <button id="theme-toggle" type="button" aria-label="다크모드 전환">🌙</button>
        </div>
      </div>
    </header>

    <section id="auth-section">
      <nav class="auth-tabs">
        <button class="auth-tab-btn active" type="button" data-mode="login">로그인</button>
        <button class="auth-tab-btn" type="button" data-mode="signup">회원가입</button>
      </nav>

      <form id="login-form" class="auth-form">
        <input type="text" id="login-username" placeholder="아이디" autocomplete="username" required />
        <input type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password" required />
        <button type="submit" class="auth-submit-btn">로그인</button>
        <p class="auth-message" id="login-message"></p>
      </form>

      <form id="signup-form" class="auth-form" hidden>
        <input type="text" id="signup-username" placeholder="아이디" autocomplete="username" required />
        <input type="password" id="signup-password" placeholder="비밀번호" autocomplete="new-password" required />
        <input type="password" id="signup-password-confirm" placeholder="비밀번호 확인" autocomplete="new-password" required />
        <button type="submit" class="auth-submit-btn">회원가입</button>
        <p class="auth-message" id="signup-message"></p>
      </form>
    </section>

    <div id="todo-view" hidden>
      <section id="progress-section"></section>

      <nav id="category-tabs">
        <button class="tab-btn active" data-category="전체">전체</button>
        <button class="tab-btn" data-category="개인">개인</button>
        <button class="tab-btn" data-category="공부">공부</button>
        <button class="tab-btn" data-category="취미">취미</button>
      </nav>

      <section id="todo-list"></section>

      <section id="input-area">
        <input type="text" id="todo-input" placeholder="할 일을 입력하세요" />
        <select id="category-select">
          <option value="개인">개인</option>
          <option value="공부">공부</option>
          <option value="취미">취미</option>
        </select>
        <button id="add-btn">추가</button>
      </section>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Supabase 프로젝트 연결 정보 (anon/publishable 키는 RLS 정책 하에 클라이언트에 노출되어도 안전하다)
  const SUPABASE_URL = "https://hazhjfnyzzhblfqftshr.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_Hp6rIqCHLRX6L9vwsYpx7A_UFye3OiM";
  const TABLE_NAME = "todo_tbl";

  const { createClient } = window.supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 다크모드 선택값 저장 키 (할 일 데이터가 아닌 화면 설정이므로 localStorage에 보관)
  const THEME_KEY = "theme";

  // 저장된 테마 선택값이 있으면 그것을, 없으면 시스템(OS) 다크모드 설정을 따른다.
  function getPreferredTheme() {
    const stored = localStorage.getItem(THEME_KEY);
    if (stored === "light" || stored === "dark") return stored;
    return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  }

  // 문서에 테마를 적용하고 토글 버튼 아이콘을 갱신한다.
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    const toggleBtn = document.getElementById("theme-toggle");
    if (toggleBtn) toggleBtn.textContent = theme === "dark" ? "☀️" : "🌙";
  }

  // 현재 테마를 반전시키고 선택값을 저장한다.
  function toggleTheme() {
    const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
  }

  // 회원 목록 및 로그인 세션 저장 키 (이 단계에서는 Supabase 대신 localStorage만 사용)
  const USERS_KEY = "users";
  const SESSION_KEY = "currentUser";

  // localStorage에 저장된 회원 목록을 불러온다. 값이 없거나 파싱에 실패하면 빈 배열을 반환한다.
  function getUsers() {
    try {
      const raw = localStorage.getItem(USERS_KEY);
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      return [];
    }
  }

  // 회원 목록을 localStorage에 저장한다.
  function saveUsers(users) {
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
  }

  // 현재 로그인된 사용자의 아이디를 반환한다. 로그인 상태가 아니면 null.
  function getCurrentUser() {
    return localStorage.getItem(SESSION_KEY);
  }

  // 로그인 세션을 저장한다.
  function setCurrentUser(username) {
    localStorage.setItem(SESSION_KEY, username);
  }

  // 로그인 세션을 제거한다(로그아웃).
  function clearCurrentUser() {
    localStorage.removeItem(SESSION_KEY);
  }

  // 로그인/회원가입 화면을 표시하고 Todo 화면을 숨긴다.
  function showAuthView() {
    document.getElementById("auth-section").hidden = false;
    document.getElementById("todo-view").hidden = true;

    const logoutBtn = document.getElementById("logout-btn");
    if (logoutBtn) logoutBtn.style.display = "none";
  }

  // Todo 화면을 표시하고 로그인/회원가입 화면을 숨긴 뒤 할 일 목록을 불러온다.
  async function showTodoView() {
    document.getElementById("auth-section").hidden = true;
    document.getElementById("todo-view").hidden = false;

    const logoutBtn = document.getElementById("logout-btn");
    if (logoutBtn) logoutBtn.style.display = "";

    todos = await loadTodos();
    renderTodos();
    renderProgress();
  }

  // 로그인/회원가입 탭 전환: 선택된 폼만 보여주고 탭 버튼의 active 상태를 갱신한다.
  function switchAuthMode(mode) {
    const loginForm = document.getElementById("login-form");
    const signupForm = document.getElementById("signup-form");
    if (loginForm) loginForm.hidden = mode !== "login";
    if (signupForm) signupForm.hidden = mode !== "signup";

    document.querySelectorAll(".auth-tab-btn").forEach((btn) => {
      btn.classList.toggle("active", btn.dataset.mode === mode);
    });

    const loginMessage = document.getElementById("login-message");
    const signupMessage = document.getElementById("signup-message");
    if (loginMessage) loginMessage.textContent = "";
    if (signupMessage) signupMessage.textContent = "";
  }

  // 회원가입 처리: 아이디 중복과 비밀번호 확인을 검사한 뒤 회원을 등록하고 바로 로그인시킨다.
  function handleSignup(e) {
    e.preventDefault();

    const username = document.getElementById("signup-username").value.trim();
    const password = document.getElementById("signup-password").value;
    const passwordConfirm = document.getElementById("signup-password-confirm").value;
    const message = document.getElementById("signup-message");

    if (!username || !password) {
      message.textContent = "아이디와 비밀번호를 입력해주세요.";
      return;
    }

    if (password !== passwordConfirm) {
      message.textContent = "비밀번호가 일치하지 않습니다.";
      return;
    }

    const users = getUsers();
    if (users.some((u) => u.username === username)) {
      message.textContent = "이미 존재하는 아이디입니다.";
      return;
    }

    users.push({ username, password });
    saveUsers(users);
    setCurrentUser(username);
    message.textContent = "";

    showTodoView();
  }

  // 로그인 처리: 아이디/비밀번호가 일치하는 회원이 있으면 로그인시키고 Todo 화면으로 전환한다.
  function handleLogin(e) {
    e.preventDefault();

    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;
    const message = document.getElementById("login-message");

    const users = getUsers();
    const matched = users.some((u) => u.username === username && u.password === password);

    if (!matched) {
      message.textContent = "아이디 또는 비밀번호가 올바르지 않습니다.";
      return;
    }

    setCurrentUser(username);
    message.textContent = "";

    showTodoView();
  }

  // 로그아웃 처리: 세션을 지우고 로그인/회원가입 화면으로 되돌아간다.
  function handleLogout() {
    clearCurrentUser();
    showAuthView();
  }

  // 전역 상태 (최소화하여 상단에 모아서 선언)
  let todos = [];              // 전체 할 일 목록
  let currentCategory = "전체"; // 현재 선택된 카테고리 탭
  let activeEditId = null;      // 인라인 편집 중인 항목의 id (없으면 null)
  let activeCommitFn = null;    // 편집 중인 항목을 저장 처리하는 함수 (동시 편집 전환 시 호출)

  // Supabase의 todo_tbl에서 할 일 목록을 최신순으로 불러온다. 실패 시 빈 배열을 반환한다.
  async function loadTodos() {
    const { data, error } = await db
      .from(TABLE_NAME)
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      console.error("불러오기 실패", error);
      return [];
    }

    return data || [];
  }

  // 새 할 일을 Supabase에 저장하고 목록 맨 앞에 추가한다. 공백만 입력된 경우 추가하지 않고 입력창 포커스만 되돌린다.
  async function addTodo(text, category) {
    const trimmed = (text || "").trim();
    const input = document.getElementById("todo-input");

    if (!trimmed) {
      if (input) input.focus();
      return;
    }

    const { data, error } = await db
      .from(TABLE_NAME)
      .insert({ text: trimmed, category: category || "개인", completed: false })
      .select()
      .single();

    if (error) {
      console.error("추가 실패", error);
      return;
    }

    todos.unshift(data);

    if (input) input.value = "";

    renderTodos();
    renderProgress();
  }

  // 해당 id의 할 일 텍스트를 Supabase와 로컬 상태에서 newText로 교체한다. 빈 문자열이면 기존 텍스트를 그대로 유지한다.
  async function editTodo(id, newText) {
    const trimmed = (newText || "").trim();
    if (!trimmed) return;

    const todo = todos.find((t) => t.id === id);
    if (!todo) return;

    const { error } = await db.from(TABLE_NAME).update({ text: trimmed }).eq("id", id);
    if (error) {
      console.error("수정 실패", error);
      return;
    }

    todo.text = trimmed;
    renderTodos();
  }

  // 해당 id의 할 일을 Supabase와 로컬 목록에서 삭제한다.
  async function deleteTodo(id) {
    const { error } = await db.from(TABLE_NAME).delete().eq("id", id);
    if (error) {
      console.error("삭제 실패", error);
      return;
    }

    todos = todos.filter((t) => t.id !== id);
    renderTodos();
    renderProgress();
  }

  // 해당 id의 완료 상태를 Supabase와 로컬 상태에서 반전(true ↔ false)시킨다.
  async function toggleTodo(id) {
    const todo = todos.find((t) => t.id === id);
    if (!todo) return;

    const nextCompleted = !todo.completed;
    const { error } = await db.from(TABLE_NAME).update({ completed: nextCompleted }).eq("id", id);
    if (error) {
      console.error("상태 변경 실패", error);
      return;
    }

    todo.completed = nextCompleted;
    renderTodos();
    renderProgress();
  }

  // 현재 선택된 카테고리(currentCategory)에 맞는 할 일만 반환한다. "전체"면 전체 목록을 그대로 반환한다.
  function filterTodos() {
    if (currentCategory === "전체") return todos;
    return todos.filter((t) => t.category === currentCategory);
  }

  // 목록의 완료율(%)을 계산한다. 항목이 0개면 나눗셈 없이 0을 반환한다.
  function calcRate(list) {
    if (list.length === 0) return 0;
    const doneCount = list.filter((t) => t.completed).length;
    return Math.round((doneCount / list.length) * 100);
  }

  // 전체 진행률과 현재 카테고리 진행률(퍼센트 + 완료 개수)을 계산해 진행률 영역을 다시 그린다.
  function renderProgress() {
    const section = document.getElementById("progress-section");
    if (!section) return;

    const overallRate = calcRate(todos);
    const overallDone = todos.filter((t) => t.completed).length;

    const categoryList = filterTodos();
    const categoryRate = calcRate(categoryList);
    const categoryDone = categoryList.filter((t) => t.completed).length;

    section.innerHTML = `
      <div class="progress-row">
        <span>전체 진행률</span>
        <span>${overallRate}% (${overallDone}/${todos.length})</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar-fill" data-category="전체" style="width: ${overallRate}%"></div>
      </div>
      <div class="progress-row">
        <span>${currentCategory} 진행률</span>
        <span>${categoryRate}% (${categoryDone}/${categoryList.length})</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar-fill" data-category="${currentCategory}" style="width: ${categoryRate}%"></div>
      </div>
    `;
  }

  // 현재 카테고리로 필터링한 할 일을 미완료 → 완료 순으로 정렬해 화면에 그린다. 목록이 비면 안내 메시지를 표시한다.
  function renderTodos() {
    const list = document.getElementById("todo-list");
    if (!list) return;

    activeEditId = null;
    activeCommitFn = null;

    const items = filterTodos();

    if (items.length === 0) {
      list.innerHTML = `<p class="empty-message">할 일이 없습니다 🎉</p>`;
      return;
    }

    const sorted = [...items].sort((a, b) => {
      if (a.completed === b.completed) return 0;
      return a.completed ? 1 : -1;
    });

    const ul = document.createElement("ul");

    sorted.forEach((todo) => {
      const li = document.createElement("li");
      li.className = "todo-item" + (todo.completed ? " completed" : "");
      li.dataset.category = todo.category;
      li.dataset.id = todo.id;

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = todo.completed;
      checkbox.addEventListener("change", () => toggleTodo(todo.id));

      const text = document.createElement("span");
      text.className = "todo-text";
      text.textContent = todo.text;
      text.addEventListener("click", () => requestStartEdit(todo.id));

      const category = document.createElement("span");
      category.className = "todo-category";
      category.textContent = todo.category;

      const editBtn = document.createElement("button");
      editBtn.textContent = "✏️";
      editBtn.addEventListener("click", () => {
        const newText = prompt("할 일 수정", todo.text);
        if (newText !== null) editTodo(todo.id, newText);
      });

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "🗑️";
      deleteBtn.classList.add("todo-delete-btn");
      deleteBtn.addEventListener("click", () => deleteTodo(todo.id));

      li.appendChild(checkbox);
      li.appendChild(text);
      li.appendChild(category);
      li.appendChild(editBtn);
      li.appendChild(deleteBtn);
      ul.appendChild(li);
    });

    list.innerHTML = "";
    list.appendChild(ul);
  }

  // 해당 id 항목의 인라인 편집을 시작한다. 다른 항목이 이미 편집 중이면 먼저 저장(자동 커밋)한 뒤 전환한다.
  function requestStartEdit(id) {
    if (activeEditId === id) return;

    if (activeCommitFn) {
      const prevCommit = activeCommitFn;
      activeCommitFn = null;
      activeEditId = null;
      prevCommit();
    }

    const li = document.querySelector(`.todo-item[data-id="${id}"]`);
    if (!li) return;

    const textSpan = li.querySelector(".todo-text");
    const deleteBtn = li.querySelector(".todo-delete-btn");
    const todo = todos.find((t) => t.id === id);
    if (!textSpan || !todo) return;

    beginEdit(todo, li, textSpan, deleteBtn);
  }

  // 텍스트를 input으로 교체해 편집 모드로 전환한다. Enter/ESC/blur에 따른 저장·취소 처리를 등록한다.
  function beginEdit(todo, li, textSpan, deleteBtn) {
    const input = document.createElement("input");
    input.type = "text";
    input.value = todo.text;

    let done = false;

    // 편집 종료 처리: shouldSave가 true면 저장(빈 값이면 유지), false면 원본으로 복원한다.
    function finish(shouldSave) {
      if (done) return;
      done = true;
      activeEditId = null;
      activeCommitFn = null;

      if (shouldSave) {
        const newText = input.value.trim();
        if (newText === "") {
          if (input.isConnected) li.replaceChild(textSpan, input);
          if (deleteBtn) deleteBtn.style.display = "";
          return;
        }
        editTodo(todo.id, newText);
        return;
      }

      if (input.isConnected) li.replaceChild(textSpan, input);
      if (deleteBtn) deleteBtn.style.display = "";
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        finish(true);
      } else if (e.key === "Escape") {
        e.preventDefault();
        finish(false);
      }
    });

    input.addEventListener("blur", () => finish(true));

    if (deleteBtn) deleteBtn.style.display = "none";

    li.replaceChild(input, textSpan);

    activeEditId = todo.id;
    activeCommitFn = () => finish(true);

    input.focus();
    input.select();
  }

  // 입력창(Enter), 추가 버튼(클릭), 카테고리 탭(클릭)에 이벤트 리스너를 등록한다.
  function bindEvents() {
    const input = document.getElementById("todo-input");
    const select = document.getElementById("category-select");
    const addBtn = document.getElementById("add-btn");
    const tabs = document.getElementById("category-tabs");
    const themeToggle = document.getElementById("theme-toggle");
    const logoutBtn = document.getElementById("logout-btn");
    const authTabs = document.querySelector(".auth-tabs");
    const loginForm = document.getElementById("login-form");
    const signupForm = document.getElementById("signup-form");

    if (themeToggle) themeToggle.addEventListener("click", toggleTheme);
    if (logoutBtn) logoutBtn.addEventListener("click", handleLogout);

    if (authTabs) {
      authTabs.addEventListener("click", (e) => {
        const btn = e.target.closest(".auth-tab-btn");
        if (!btn) return;
        switchAuthMode(btn.dataset.mode);
      });
    }

    if (loginForm) loginForm.addEventListener("submit", handleLogin);
    if (signupForm) signupForm.addEventListener("submit", handleSignup);

    addBtn.addEventListener("click", () => {
      addTodo(input.value, select.value);
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        addTodo(input.value, select.value);
      }
    });

    tabs.addEventListener("click", (e) => {
      const btn = e.target.closest(".tab-btn");
      if (!btn) return;

      currentCategory = btn.dataset.category;

      tabs.querySelectorAll(".tab-btn").forEach((t) => {
        t.classList.toggle("active", t === btn);
      });

      renderTodos();
      renderProgress();
    });
  }

  // 앱 초기화: 테마를 적용하고 이벤트를 등록한 뒤, 로그인 상태에 따라 인증 화면 또는 Todo 화면을 보여준다.
  async function init() {
    applyTheme(getPreferredTheme());
    bindEvents();

    if (getCurrentUser()) {
      await showTodoView();
    } else {
      showAuthView();
    }
  }

  init();
</script>
</body>
</html>
